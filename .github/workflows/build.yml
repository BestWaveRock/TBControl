name: Build TBControl

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build and Package
        env:
          ARCH: x86_64
        run: |
          chmod +x Scripts/build.sh
          ./Scripts/build.sh

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: TBControl
          path: |
            build/TBControl.dmg
            build/TBControl.app
          if-no-files-found: error
