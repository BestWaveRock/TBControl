name: Release TBControl

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: macos-13
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app/Contents/Developer || true

      - name: Build and Package
        env:
          VERSION: ${{ github.ref_name }}
          ARCH: x86_64
        run: |
          chmod +x Scripts/build.sh
          ./Scripts/build.sh

      - name: Prepare Release Notes
        run: |
          # 获取当前 tag 的 commit message
          git log -1 --pretty=%B > release_notes.md
          echo "" >> release_notes.md
          echo "---" >> release_notes.md
          echo "*构建于 GitHub Actions*" >> release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/TBControl.dmg
          body_path: release_notes.md
          generate_release_notes: false
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
